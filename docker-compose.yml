version: '3.8'

services:
  user-service:
    image: user-service:v1
    container_name: live-user-service
    ports:
      - "8001:8001"
    networks:
      - microservices-net

  product-service:
    image: product-service:v1
    container_name: live-product-service
    ports:
      - "8002:8002"
    networks:
      - microservices-net

  order-service:
    image: order-service:v1
    container_name: live-order-service
    ports:
      - "8003:8003"
    environment:
      - USER_SERVICE_URL=http://user-service:8001
      - PRODUCT_SERVICE_URL=http://product-service:8002
    networks:
      - microservices-net
    depends_on:
      - user-service
      - product-service

networks:
  microservices-net:
    driver: bridge
